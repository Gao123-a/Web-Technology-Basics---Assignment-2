<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Vehicles - Gallop Motors</title>
    <style>
         :root {
            --primary: #1a1a2e;
            --accent: #c9a96e;
            --accent-hover: #b8944f;
            --dark: #0d0d1a;
            --light: #f5f5f0;
            --white: #ffffff;
            --gray: #6b7280;
            --gray-light: #e5e7eb;
            --card-bg: #ffffff;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.12);
            --radius: 12px;
            --radius-lg: 20px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background-color: var(--light);
            color: var(--primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        /* ============ Navbar ============ */
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 16px 0;
            background: rgba(13, 13, 26, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 2px 30px rgba(0, 0, 0, 0.3);
        }
        
        .navbar-inner {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--white);
            letter-spacing: 1px;
        }
        
        .logo-icon {
            width: 42px;
            height: 42px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }
        
        .nav-links {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 20px;
        }
        
        .nav-links a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
        }
        
        .nav-links a:hover {
            color: var(--accent);
        }
        /* ============ Search Section ============ */
        
        .search-container {
            max-width: 1200px;
            margin: 140px auto 40px;
            padding: 0 30px;
        }
        
        .search-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .search-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        
        .search-header p {
            color: var(--gray);
            font-size: 1.1rem;
        }
        
        .search-box {
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)) auto;
            gap: 20px;
            align-items: end;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--primary);
        }
        
        .form-control {
            padding: 12px 16px;
            border: 2px solid var(--gray-light);
            border-radius: 10px;
            font-size: 1rem;
            transition: var(--transition);
            background: #fafafa;
            font-family: inherit;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(201, 169, 110, 0.1);
        }
        
        .btn-search {
            padding: 12px 40px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            height: 52px;
        }
        
        .btn-search:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(201, 169, 110, 0.3);
        }
        /* ============ Results Section ============ */
        
        .results-section {
            max-width: 1200px;
            margin: 40px auto 80px;
            padding: 0 30px;
        }
        
        .results-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            color: var(--gray);
            font-weight: 500;
        }
        
        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }
        
        .car-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }
        
        .car-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
        }
        
        .car-img {
            height: 220px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            position: relative;
        }
        
        .car-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--accent);
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        
        .car-info {
            padding: 25px;
        }
        
        .car-info h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--primary);
        }
        
        .car-specs {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            color: var(--gray);
            font-size: 0.9rem;
        }
        
        .spec-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .car-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid var(--gray-light);
        }
        
        .price-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent);
        }
        
        .btn-view {
            padding: 8px 20px;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .btn-view:hover {
            background: #000;
        }
        
        .no-results {
            text-align: center;
            padding: 100px 0;
            grid-column: 1 / -1;
        }
        
        .no-results i {
            font-size: 4rem;
            color: var(--gray-light);
            margin-bottom: 20px;
            display: block;
        }
        /* Responsive */
        
        @media (max-width: 768px) {
            .search-box {
                grid-template-columns: 1fr;
            }
            .btn-search {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="logo">
                <div class="logo-icon">🏎️</div>
                Gallop Motors
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="#">Inventory</a></li>
            </ul>
        </div>
    </nav>

    <!-- Search Section -->
    <div class="search-container">
        <div class="search-header">
            <h1>Find Your Perfect Ride</h1>
            <p>Search through our premium collection of vehicles by model and year</p>
        </div>

        <div class="search-box">
            <div class="form-group">
                <label for="modelSelect">Car Model</label>
                <select id="modelSelect" class="form-control">
                    <option value="all">All Models</option>
                    <option value="Tesla">Tesla</option>
                    <option value="BMW">BMW</option>
                    <option value="Mercedes">Mercedes</option>
                    <option value="Audi">Audi</option>
                    <option value="Porsche">Porsche</option>
                    <option value="Toyota">Toyota</option>
                </select>
            </div>

            <div class="form-group">
                <label for="yearSelect">Manufacture Year</label>
                <select id="yearSelect" class="form-control">
                    <option value="all">Any Year</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                    <option value="2022">2022</option>
                    <option value="2021">2021</option>
                    <option value="2020">2020</option>
                    <option value="older">2019 & Older</option>
                </select>
            </div>

            <button id="searchBtn" class="btn-search">Search Now</button>
        </div>
    </div>

    <!-- Results Section -->
    <div class="results-section">
        <div class="results-info">
            <span id="resultsCount">Showing all vehicles</span>
            <span>Sort by: Newest First</span>
        </div>

        <div id="carsGrid" class="cars-grid">
            <!-- Results will be injected here by JS -->
        </div>
    </div>

    <script>
        // Mock Car Data
        const defaultCars = [{
            id: 1,
            model: 'Tesla Model S',
            brand: 'Tesla',
            year: 2024,
            price: '$89,900',
            emoji: '⚡',
            type: 'Electric'
        }, {
            id: 2,
            model: 'BMW M4 Competition',
            brand: 'BMW',
            year: 2023,
            price: '$78,600',
            emoji: '🏎️',
            type: 'Gasoline'
        }, {
            id: 3,
            model: 'Mercedes-Benz G-Class',
            brand: 'Mercedes',
            year: 2022,
            price: '$139,900',
            emoji: '🚙',
            type: 'SUV'
        }, {
            id: 4,
            model: 'Audi RS6 Avant',
            brand: 'Audi',
            year: 2023,
            price: '$121,000',
            emoji: '🚗',
            type: 'Wagon'
        }, {
            id: 5,
            model: 'Porsche 911 GT3',
            brand: 'Porsche',
            year: 2024,
            price: '$169,700',
            emoji: '🏁',
            type: 'Sport'
        }, {
            id: 6,
            model: 'Toyota Supra',
            brand: 'Toyota',
            year: 2022,
            price: '$52,500',
            emoji: '🇯🇵',
            type: 'Sport'
        }, {
            id: 7,
            model: 'Tesla Model 3',
            brand: 'Tesla',
            year: 2021,
            price: '$38,990',
            emoji: '🔋',
            type: 'Electric'
        }, {
            id: 8,
            model: 'BMW X5',
            brand: 'BMW',
            year: 2020,
            price: '$61,000',
            emoji: '🏙️',
            type: 'SUV'
        }, {
            id: 9,
            model: 'Audi Q7',
            brand: 'Audi',
            year: 2019,
            price: '$55,800',
            emoji: '🏔️',
            type: 'SUV'
        }, {
            id: 10,
            model: 'Porsche Macan',
            brand: 'Porsche',
            year: 2023,
            price: '$62,000',
            emoji: '🐅',
            type: 'SUV'
        }, {
            id: 11,
            model: 'Toyota Camry',
            brand: 'Toyota',
            year: 2024,
            price: '$26,000',
            emoji: '🏯',
            type: 'Sedan'
        }, {
            id: 12,
            model: 'Mercedes-Benz S-Class',
            brand: 'Mercedes',
            year: 2024,
            price: '$114,000',
            emoji: '🏛️',
            type: 'Sedan'
        }];

        // Load user cars from localStorage and map to search format
        const userCarsRaw = JSON.parse(localStorage.getItem('userCars') || '[]');
        const userCars = userCarsRaw.map(car => ({
            id: car.id,
            model: car.name,
            brand: car.brand,
            year: car.year,
            price: car.displayPrice,
            image: car.image,
            emoji: car.emoji,
            type: car.type
        }));

        const cars = [...defaultCars, ...userCars];

        const carsGrid = document.getElementById('carsGrid');
        const modelSelect = document.getElementById('modelSelect');
        const yearSelect = document.getElementById('yearSelect');
        const searchBtn = document.getElementById('searchBtn');
        const resultsCount = document.getElementById('resultsCount');

        function displayCars(filteredCars) {
            carsGrid.innerHTML = '';

            if (filteredCars.length === 0) {
                carsGrid.innerHTML = `
                    <div class="no-results">
                        <i>🔍</i>
                        <h2>No matching vehicles found</h2>
                        <p>Try adjusting your search criteria</p>
                    </div>
                `;
                resultsCount.textContent = '0 vehicles found';
                return;
            }

            filteredCars.forEach(car => {
                        const card = document.createElement('div');
                        card.className = 'car-card';
                        card.innerHTML = `
                    <div class="car-img">
                        <span class="car-badge">${car.type}</span>
                        ${car.image ? `<img src="${car.image}" style="width:100%; height:100%; object-fit:cover;">` : car.emoji}
                    </div>
                    <div class="car-info">
                        <h3>${car.model}</h3>
                        <div class="car-specs">
                            <div class="spec-item">📅 ${car.year}</div>
                            <div class="spec-item">⚙️ Automatic</div>
                        </div>
                        <div class="car-price">
                            <span class="price-value">${car.price}</span>
                            <a href="#" class="btn-view">Details</a>
                        </div>
                    </div>
                `;
                carsGrid.appendChild(card);
            });

            resultsCount.textContent = `${filteredCars.length} vehicles found`;
        }

        function handleSearch() {
            const selectedModel = modelSelect.value;
            const selectedYear = yearSelect.value;

            const filtered = cars.filter(car => {
                const modelMatch = selectedModel === 'all' || car.brand === selectedModel;

                let yearMatch = false;
                if (selectedYear === 'all') {
                    yearMatch = true;
                } else if (selectedYear === 'older') {
                    yearMatch = car.year <= 2019;
                } else {
                    yearMatch = car.year == parseInt(selectedYear);
                }

                return modelMatch && yearMatch;
            });

            displayCars(filtered);
        }

        searchBtn.addEventListener('click', handleSearch);

        // Initial display
        displayCars(cars);
    </script>
</body>

</html>
